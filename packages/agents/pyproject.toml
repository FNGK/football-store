[project]
name = "amp-agents"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "langgraph>=0.2.60",
  "crewai>=0.86.0",
  "numpy>=2.0.0",
  "amp-shared",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["amp_agents"]
